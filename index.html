<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>互动剧情游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  background: #0a0a0a;
  color: #eee;
  font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}
.gate-container {
  text-align: center;
  padding: 40px 30px;
  max-width: 400px;
  width: 90%;
}
.gate-title {
  font-size: 42px;
  font-weight: bold;
  letter-spacing: 8px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #c9a96e, #f0d68a, #c9a96e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
}
.gate-subtitle {
  font-size: 14px;
  color: #666;
  letter-spacing: 4px;
  margin-bottom: 50px;
}
.gate-input-wrap {
  position: relative;
  margin-bottom: 30px;
}
.gate-input {
  width: 100%;
  padding: 16px 20px;
  font-size: 18px;
  text-align: center;
  letter-spacing: 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid #333;
  border-radius: 8px;
  color: #eee;
  outline: none;
  transition: all 0.3s;
}
.gate-input:focus {
  border-color: #c9a96e;
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 20px rgba(201,169,110,0.15);
}
.gate-input::placeholder {
  color: #444;
  letter-spacing: 2px;
  font-size: 14px;
}
.gate-btn {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  letter-spacing: 6px;
  background: linear-gradient(135deg, #8b6914, #c9a96e);
  border: none;
  border-radius: 8px;
  color: #111;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s;
}
.gate-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(201,169,110,0.3);
}
.gate-btn:active {
  transform: translateY(0);
}
.gate-error {
  color: #c22;
  font-size: 13px;
  margin-top: 15px;
  min-height: 20px;
  opacity: 0;
  transition: opacity 0.3s;
}
.gate-error.show {
  opacity: 1;
}
.gate-hint {
  margin-top: 40px;
  font-size: 12px;
  color: #333;
  letter-spacing: 1px;
}
/* Particles */
.particle {
  position: fixed;
  width: 2px;
  height: 2px;
  background: rgba(201,169,110,0.3);
  border-radius: 50%;
  pointer-events: none;
  animation: float 8s infinite ease-in-out;
}
@keyframes float {
  0%, 100% { transform: translateY(0) scale(1); opacity: 0; }
  50% { transform: translateY(-100vh) scale(1.5); opacity: 1; }
}
</style>
</head>
<body>
<div class="gate-container">
  <div class="gate-title">互动剧情游戏</div>
  <div class="gate-subtitle">输入密令开始体验</div>
  <div class="gate-input-wrap">
    <input class="gate-input" id="gate-password" type="password" placeholder="请输入密令" maxlength="10" autofocus>
  </div>
  <button class="gate-btn" id="gate-enter">进 入</button>
  <div class="gate-error" id="gate-error">密令有误，请重新输入</div>
  <div class="gate-hint">·</div>
</div>
<script>
(function() {
  var routes = {
    "111": "game1.html",
    "101": "game2.html"
  };
  var input = document.getElementById("gate-password");
  var btn = document.getElementById("gate-enter");
  var error = document.getElementById("gate-error");

  function enter() {
    var val = input.value.trim();
    if (routes[val]) {
      window.location.href = routes[val];
    } else {
      error.classList.add("show");
      input.value = "";
      input.focus();
      setTimeout(function() { error.classList.remove("show"); }, 2000);
    }
  }

  btn.addEventListener("click", enter);
  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") enter();
  });

  // Floating particles
  for (var i = 0; i < 20; i++) {
    var p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "%";
    p.style.top = Math.random() * 100 + "%";
    p.style.animationDelay = Math.random() * 8 + "s";
    p.style.animationDuration = (6 + Math.random() * 6) + "s";
    document.body.appendChild(p);
  }
})();
</script>
</body>
</html>
